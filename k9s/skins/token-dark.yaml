# k9s skin — token-dark
# Palette from https://github.com/ThorstenRhau/token

foreground:   &foreground   "#e8e4dc"
background:   &background   "#262624"
status_bar:   &status_bar   "#1d1d1c"
selection:    &selection    "#3a3a37"
comment:      &comment      "#938e87"
border:       &border       "#5a5955"
orange:       &orange       "#d97757"
yellow:       &yellow       "#c4a855"
green:        &green        "#7da47a"
red:          &red          "#c67777"
blue:         &blue         "#7b9ebd"
purple:       &purple       "#a68bbf"
cyan:         &cyan         "#6ba8a8"

k9s:
  body:
    fgColor: *foreground
    bgColor: *background
    logoColor: *orange
  prompt:
    fgColor: *foreground
    bgColor: *background
    suggestColor: *orange
  info:
    fgColor: *purple
    sectionColor: *foreground
  help:
    fgColor: *foreground
    bgColor: *background
    keyColor: *orange
    numKeyColor: *blue
    sectionColor: *green
  dialog:
    fgColor: *foreground
    bgColor: *background
    buttonFgColor: *foreground
    buttonBgColor: *purple
    buttonFocusFgColor: *background
    buttonFocusBgColor: *orange
    labelFgColor: *yellow
    fieldFgColor: *foreground
  frame:
    border:
      fgColor: *border
      focusColor: *orange
    menu:
      fgColor: *foreground
      keyColor: *orange
      numKeyColor: *blue
    crumbs:
      fgColor: *background
      bgColor: *comment
      activeColor: *blue
    status:
      newColor: *cyan
      modifyColor: *blue
      addColor: *green
      errorColor: *red
      highlightColor: *orange
      killColor: *comment
      completedColor: *comment
    title:
      fgColor: *foreground
      bgColor: *background
      highlightColor: *orange
      counterColor: *blue
      filterColor: *purple
  views:
    charts:
      bgColor: *background
      defaultDialColors:
        - *blue
        - *red
      defaultChartColors:
        - *blue
        - *red
    table:
      fgColor: *foreground
      bgColor: *background
      cursorFgColor: *background
      cursorBgColor: *selection
      header:
        fgColor: *foreground
        bgColor: *status_bar
        sorterColor: *orange
    xray:
      fgColor: *foreground
      bgColor: *background
      cursorColor: *selection
      graphicColor: *blue
      showIcons: false
    yaml:
      keyColor: *purple
      colonColor: *border
      valueColor: *foreground
    logs:
      fgColor: *foreground
      bgColor: *background
      indicator:
        fgColor: *foreground
        bgColor: *status_bar
